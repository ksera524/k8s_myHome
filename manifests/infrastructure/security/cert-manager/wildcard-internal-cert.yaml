# 内部公開用ワイルドカード証明書
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: wildcard-internal
  namespace: nginx-gateway
spec:
  secretName: wildcard-internal-tls
  duration: 8760h # 1年
  renewBefore: 720h # 30日前から更新
  issuerRef:
    name: internal-ca-issuer
    kind: ClusterIssuer
  dnsNames:
    - "*.internal.qroksera.com"
  usages:
    - digital signature
    - key encipherment
    - server auth
