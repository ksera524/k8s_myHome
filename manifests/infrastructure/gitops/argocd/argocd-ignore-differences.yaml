# ArgoCD Application Patches for Ignore Differences
# StatefulSetやCRDの差分を無視する設定
apiVersion: v1
kind: ConfigMap
metadata:
  name: argocd-ignore-differences
  namespace: argocd
data:
  harbor-patch.yaml: |
    - op: add
      path: /spec/ignoreDifferences
      value:
      - group: apps
        kind: StatefulSet
        jsonPointers:
        - /spec/volumeClaimTemplates
  
  metallb-patch.yaml: |
    - op: add
      path: /spec/ignoreDifferences
      value:
      - group: apiextensions.k8s.io
        kind: CustomResourceDefinition
        name: addresspools.metallb.io
      - group: apiextensions.k8s.io
        kind: CustomResourceDefinition
        name: bgppeers.metallb.io
  
  arc-controller-patch.yaml: |
    - op: add
      path: /spec/ignoreDifferences
      value:
      - group: rbac.authorization.k8s.io
        kind: ClusterRole
        jsonPointers:
        - /rules