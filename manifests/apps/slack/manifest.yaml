apiVersion: apps/v1
kind: Deployment
metadata:
  name: slack-rs
  namespace: sandbox
  labels:
    app: slack
spec:
  replicas: 1
  selector:
    matchLabels:
      app: slack
  template:
    metadata:
      labels:
        app: slack
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        seccompProfile:
          type: RuntimeDefault
      restartPolicy: Always
      imagePullSecrets:
        - name: harbor-registry
      containers:
        - name: slack
          image: harbor.qroksera.com/sandbox/slack.rs:0.0.7
          imagePullPolicy: Always
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
            runAsNonRoot: true
            runAsUser: 1000
            runAsGroup: 1000
          ports:
            - containerPort: 3000
          workingDir: /app
          envFrom:
            - configMapRef:
                name: sandbox-connection-info
          env:
            - name: SLACK_BOT_TOKEN
              valueFrom:
                secretKeyRef:
                  name: slack
                  key: SLACK_BOT_TOKEN
            - name: RUSTFS_S3_ACCESS_KEY_ID
              valueFrom:
                secretKeyRef:
                  name: rustfs-auth
                  key: RUSTFS_ACCESS_KEY
            - name: RUSTFS_S3_SECRET_ACCESS_KEY
              valueFrom:
                secretKeyRef:
                  name: rustfs-auth
                  key: RUSTFS_SECRET_KEY
            - name: RUST_LOG
              value: "INFO"
          resources:
            requests:
              cpu: 50m
              memory: 128Mi
            limits:
              cpu: 300m
              memory: 512Mi
          command: ["./slack"]
          # GitHub Actionsでビルドしたイメージの即時終了対策
          livenessProbe:
            tcpSocket:
              port: 3000
            initialDelaySeconds: 20
            periodSeconds: 15
            timeoutSeconds: 3
            failureThreshold: 5
          readinessProbe:
            tcpSocket:
              port: 3000
            initialDelaySeconds: 15
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 5


---
apiVersion: v1
kind: Service
metadata:
  name: slack
  namespace: sandbox
spec:
  type: NodePort
  selector:
    app: slack
  ports:
    - protocol: TCP
      port: 3000
      targetPort: 3000
      nodePort: 32001

---
# slack内部公開用HTTPRoute（HTTP→HTTPSリダイレクト）
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: slack-internal-redirect
  namespace: sandbox
spec:
  parentRefs:
    - name: nginx-gateway
      namespace: nginx-gateway
      sectionName: http
  hostnames:
    - slack.internal.qroksera.com
  rules:
    - filters:
        - type: RequestRedirect
          requestRedirect:
            scheme: https
            statusCode: 301

---
# slack内部公開用HTTPRoute（HTTPS）
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: slack-internal
  namespace: sandbox
spec:
  parentRefs:
    - name: nginx-gateway
      namespace: nginx-gateway
      sectionName: https-internal
  hostnames:
    - slack.internal.qroksera.com
  rules:
    - backendRefs:
        - name: slack
          port: 3000
