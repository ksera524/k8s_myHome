apiVersion: apps/v1
kind: Deployment
metadata:
  name: hitomi-upload-viewer
  namespace: sandbox
  labels:
    app: hitomi-upload-viewer
spec:
  replicas: 1
  selector:
    matchLabels:
      app: hitomi-upload-viewer
  template:
    metadata:
      labels:
        app: hitomi-upload-viewer
    spec:
      restartPolicy: Always
      imagePullSecrets:
        - name: harbor-registry
      containers:
        - name: hitomi-upload-viewer
          image: harbor.qroksera.com/sandbox/hitomi-upload-viewer:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 80
          env:
            - name: WRAPPER_API_BASE_URL
              value: "http://slack:3000"
            - name: S3_BUCKET
              value: "pdfs"
            - name: S3_PREFIX
              value: "hitomi"

---
# hitomi-upload-viewer用Service（内部公開のみ）
apiVersion: v1
kind: Service
metadata:
  name: hitomi-upload-viewer
  namespace: sandbox
  labels:
    app: hitomi-upload-viewer
spec:
  selector:
    app: hitomi-upload-viewer
  ports:
    - name: http
      port: 80
      targetPort: 80
      protocol: TCP
---
# hitomi-upload-viewer内部公開用HTTPRoute（HTTP→HTTPSリダイレクト）
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: hitomi-upload-viewer-internal-redirect
  namespace: sandbox
spec:
  parentRefs:
    - name: nginx-gateway
      namespace: nginx-gateway
      sectionName: http
  hostnames:
    - hitomi-upload-viewer.internal.qroksera.com
  rules:
    - filters:
        - type: RequestRedirect
          requestRedirect:
            scheme: https
            statusCode: 301
---
# hitomi-upload-viewer内部公開用HTTPRoute（HTTPS）
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: hitomi-upload-viewer-internal
  namespace: sandbox
spec:
  parentRefs:
    - name: nginx-gateway
      namespace: nginx-gateway
      sectionName: https-internal
  hostnames:
    - hitomi-upload-viewer.internal.qroksera.com
  rules:
    - backendRefs:
        - name: hitomi-upload-viewer
          port: 80
