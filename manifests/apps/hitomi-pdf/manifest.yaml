apiVersion: batch/v1
kind: CronJob
metadata:
  name: hitomi-pdf-monitor
  namespace: sandbox
spec:
  schedule: "30 14 * * *"
  concurrencyPolicy: "Forbid"
  successfulJobsHistoryLimit: 1
  failedJobsHistoryLimit: 3
  jobTemplate:
    spec:
      activeDeadlineSeconds: 7200
      backoffLimit: 0
      template:
        metadata:
          labels:
            app: hitomi-pdf-monitor
        spec:
          initContainers:
            - name: setup-busybox
              image: busybox:1.36
              imagePullPolicy: IfNotPresent
              command:
                - sh
                - -c
                - cp /bin/busybox /work/busybox && chmod +x /work/busybox
              volumeMounts:
                - name: tools
                  mountPath: /work
          containers:
            - name: hitomi-pdf-monitor
              image: harbor.qroksera.com/sandbox/hitomi-pdf-batch:latest
              imagePullPolicy: Always
              command:
                - /tools/busybox
                - sh
                - -c
              args:
                - exec /app/hitomi-pdf-batch "$(/tools/busybox date +%Y%m%d)"
              envFrom:
                - configMapRef:
                    name: sandbox-connection-info
              env:
                - name: TZ
                  value: "Asia/Tokyo"
                - name: WRAPPER_API_BASE_URL
                  value: "https://api-hub.internal.qroksera.com"
                - name: RUSTFS_S3_BUCKET
                  value: pdfs
                - name: WRAPPER_API_INSECURE_SKIP_VERIFY
                  value: "true"
              volumeMounts:
                - name: tools
                  mountPath: /tools
          restartPolicy: Never
          imagePullSecrets:
            - name: harbor-registry
          volumes:
            - name: tools
              emptyDir: {}
