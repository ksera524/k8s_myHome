apiVersion: batch/v1
kind: CronJob
metadata:
  name: hitomi-pdf-monitor
  namespace: sandbox
spec:
  schedule: "55 13 * * *"
  concurrencyPolicy: "Forbid"
  successfulJobsHistoryLimit: 1
  failedJobsHistoryLimit: 3
  jobTemplate:
    spec:
      activeDeadlineSeconds: 7200
      backoffLimit: 0
      template:
        metadata:
          labels:
            app: hitomi-pdf-monitor
        spec:
          containers:
            - name: hitomi-pdf-monitor
              image: harbor.qroksera.com/sandbox/hitomi-pdf-batch:latest
              imagePullPolicy: Always
              envFrom:
                - configMapRef:
                    name: sandbox-connection-info
              env:
                - name: WRAPPER_API_BASE_URL
                  value: "https://api-hub.internal.qroksera.com"
                - name: RUSTFS_S3_BUCKET
                  value: pdfs
          restartPolicy: Never
          imagePullSecrets:
            - name: harbor-registry
