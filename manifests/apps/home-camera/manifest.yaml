apiVersion: batch/v1
kind: CronJob
metadata:
  name: home-camera-recorder
  namespace: sandbox
spec:
  schedule: "0 * * * *"
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 2
  failedJobsHistoryLimit: 3
  jobTemplate:
    spec:
      backoffLimit: 1
      activeDeadlineSeconds: 3900
      template:
        spec:
          restartPolicy: OnFailure
          imagePullSecrets:
            - name: harbor-registry
          containers:
            - name: recorder
              image: harbor.qroksera.com/sandbox/home-camera:latest
              imagePullPolicy: Always
              envFrom:
                - configMapRef:
                    name: sandbox-connection-info
              env:
                - name: RTSP_URL
                  value: "rtsp://s5kVuizVreFu2SxK:0FnaKGTm2bGgqxK2@192.168.10.15/live0"
                - name: AWS_ACCESS_KEY_ID
                  valueFrom:
                    secretKeyRef:
                      name: rustfs-auth
                      key: RUSTFS_ACCESS_KEY
                - name: AWS_SECRET_ACCESS_KEY
                  valueFrom:
                    secretKeyRef:
                      name: rustfs-auth
                      key: RUSTFS_SECRET_KEY
                - name: S3_BUCKET
                  value: home-camera-recordings
                - name: CAMERA_ID
                  value: camera
                - name: RECORD_SECONDS
                  value: "3600"
