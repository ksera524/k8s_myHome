apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet
metadata:
  name: arc-runners
  namespace: argocd
spec:
  goTemplate: true
  generators:
  - list:
      elements:
      - name: blog
        githubOwner: ksera524
        githubRepo: blog
        runnerName: blog-runners
        minRunners: '0'
        maxRunners: '3'
        workflowStrategy: semver
      - name: cooklog
        githubOwner: ksera524
        githubRepo: cookLog
        runnerName: cooklog-runners
        minRunners: '0'
        maxRunners: '3'
        workflowStrategy: semver
      - name: hitomi
        githubOwner: ksera524
        githubRepo: hitomi
        runnerName: hitomi-runners
        minRunners: '0'
        maxRunners: '3'
        workflowStrategy: latest
      - name: slack-rs
        githubOwner: ksera524
        githubRepo: slack.rs
        runnerName: slack-rs-runners
        minRunners: '0'
        maxRunners: '3'
        workflowStrategy: semver
      - name: home-camera
        githubOwner: ksera524
        githubRepo: home-camera
        runnerName: home-camera-runners
        minRunners: '1'
        maxRunners: '1'
        workflowStrategy: latest
  template:
    metadata:
      name: '{{ .name }}-runner'
      namespace: argocd
      annotations:
        argocd.argoproj.io/sync-wave: '9'
      finalizers:
      - resources-finalizer.argocd.argoproj.io
    spec:
      project: platform
      source:
        repoURL: ghcr.io/actions/actions-runner-controller-charts
        chart: gha-runner-scale-set
        targetRevision: 0.13.1
        helm:
          releaseName: '{{ .runnerName }}'
          parameters:
          - name: githubConfigUrl
            value: https://github.com/{{ .githubOwner }}/{{ .githubRepo }}
          - name: githubConfigSecret
            value: github-multi-repo-secret
          - name: minRunners
            value: '{{ .minRunners }}'
          - name: maxRunners
            value: '{{ .maxRunners }}'
          - name: controllerServiceAccount.namespace
            value: arc-systems
          - name: controllerServiceAccount.name
            value: arc-controller-gha-rs-controller
          values: "template:\n  spec:\n    serviceAccountName: github-actions-runner\n\
            \    hostAliases:\n      - ip: 192.168.122.100\n        hostnames:\n \
            \         - harbor.internal.qroksera.com\n    initContainers:\n      -\
            \ name: init-dind-externals\n        image: ghcr.io/actions/actions-runner:latest\n\
            \        command: [\"cp\"]\n        args: [\"-r\", \"/home/runner/externals/.\"\
            , \"/home/runner/tmpDir/\"]\n        volumeMounts:\n          - name:\
            \ dind-externals\n            mountPath: /home/runner/tmpDir\n      -\
            \ name: dind\n        image: docker:dind\n        command: [\"sh\", \"\
            -c\"]\n        args:\n          - |\n            set -e\n            cp\
            \ /etc/docker/certs.d/harbor.internal.qroksera.com/ca.crt /usr/local/share/ca-certificates/harbor-internal-ca.crt\n\
            \            update-ca-certificates\n            dockerd --host=unix:///var/run/docker.sock\
            \ --group=$(DOCKER_GROUP_GID) --insecure-registry=harbor.internal.qroksera.com\n\
            \        env:\n          - name: DOCKER_GROUP_GID\n            value:\
            \ \"123\"\n        securityContext:\n          privileged: true\n    \
            \    restartPolicy: Always\n        startupProbe:\n          exec:\n \
            \           command: [\"docker\", \"info\"]\n          failureThreshold:\
            \ 24\n          periodSeconds: 5\n        volumeMounts:\n          - name:\
            \ work\n            mountPath: /home/runner/_work\n          - name: dind-sock\n\
            \            mountPath: /var/run\n          - name: dind-externals\n \
            \           mountPath: /home/runner/externals\n          - name: harbor-internal-ca\n\
            \            mountPath: /etc/docker/certs.d/harbor.internal.qroksera.com\n\
            \            readOnly: true\n    containers:\n      - name: runner\n \
            \       image: ghcr.io/actions/actions-runner:latest\n        command:\
            \ [\"/home/runner/run.sh\"]\n        env:\n          - name: DOCKER_HOST\n\
            \            value: unix:///var/run/docker.sock\n          - name: RUNNER_WAIT_FOR_DOCKER_IN_SECONDS\n\
            \            value: \"120\"\n        volumeMounts:\n          - name:\
            \ work\n            mountPath: /home/runner/_work\n          - name: dind-sock\n\
            \            mountPath: /var/run\n    volumes:\n      - name: dind-sock\n\
            \        emptyDir: {}\n      - name: dind-externals\n        emptyDir:\
            \ {}\n      - name: work\n        emptyDir: {}\n      - name: harbor-internal-ca\n\
            \        configMap:\n          name: harbor-internal-ca\n          items:\n\
            \            - key: ca.crt\n              path: ca.crt\n"
      destination:
        server: https://kubernetes.default.svc
        namespace: arc-systems
      syncPolicy:
        automated:
          prune: true
          selfHeal: true
        syncOptions:
        - CreateNamespace=true
        - ServerSideApply=true
