apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
  # ARC Controller は infrastructure/gitops/arc/arc-controller.yaml に移動
  # RBAC
  - github-actions-rbac.yaml
  - github-actions-harbor-rbac.yaml
  # External Secrets (GitHub PATはESO経由で取得)
  # Note: github-token-secretはplatform/secrets/external-secrets/externalsecrets.yamlで管理
  # Runner ScaleSetはGitOps経由で管理
  # - runner-docker-config.yaml  # AutoscalingRunnerSet CRDが必要
  - multi-repo-runner-scalesets.yaml