---
# AutoscalingRunnerSet for general shared usage (新規リポジトリ用のテンプレート)
apiVersion: actions.github.com/v1alpha1
kind: AutoscalingRunnerSet
metadata:
  name: shared-runners
  namespace: arc-systems
  labels:
    app.kubernetes.io/name: shared-runners
    app.kubernetes.io/part-of: actions-runner-controller
    purpose: shared
spec:
  # 共用目的のため、メインリポジトリを設定
  githubConfigUrl: https://github.com/ksera524/k8s_myHome
  githubConfigSecret: github-multi-repo-secret
  runnerGroup: default
  minRunners: 0
  maxRunners: 2
  runnerScaleSetName: shared-runners
  
  containerMode:
    type: "dind"
  
  template:
    spec:
      serviceAccountName: github-actions-runner
      
      containers:
      - name: runner
        image: ghcr.io/actions/actions-runner:latest
        command: ["/home/runner/run.sh"]
        env:
        - name: HARBOR_URL
          value: "192.168.122.100"
        - name: HARBOR_PROJECT
          value: "sandbox"
        - name: RUNNER_PURPOSE
          value: "shared"
        resources:
          limits:
            cpu: "1200m"
            memory: "2Gi"
          requests:
            cpu: "200m"
            memory: "512Mi"
        volumeMounts:
        - name: work
          mountPath: /home/runner/_work
        - name: dind-sock
          mountPath: /var/run
      
      - name: dind
        image: docker:dind
        securityContext:
          privileged: true
        volumeMounts:
        - name: work
          mountPath: /home/runner/_work
        - name: dind-sock
          mountPath: /var/run
        env:
        - name: DOCKER_TLS_CERTDIR
          value: ""
      
      volumes:
      - name: work
        emptyDir: {}
      - name: dind-sock
        emptyDir: {}